<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Pratibha AI</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <style>
    :root {
      --color-bg-start: #0f172a;
      --color-bg-end: #020617;
      --color-card: #1e293b;
      --color-text-main: #f8fafc;
      --color-text-muted: #94a3b8;
      --color-accent: #f97316;
      --color-accent-hover: #ea580c;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--color-bg-start), var(--color-bg-end));
      color: var(--color-text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      max-width: 420px;
      width: 100%;
      background: var(--color-card);
      border: 1px solid #334155;
      border-radius: 24px;
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3), 0 8px 10px -6px rgb(0 0 0 / 0.3);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon-wrapper {
      width: 80px;
      height: 80px;
      background: rgba(249, 115, 22, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: var(--color-accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); }
      70% { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(249, 115, 22, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--color-accent);
      margin-bottom: 16px;
    }

    p {
      font-size: 14px;
      color: var(--color-text-muted);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    p.hindi {
      font-size: 15px;
      margin-bottom: 24px;
      border-bottom: 1px dashed #334155;
      padding-bottom: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background-color: var(--color-accent);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(249, 115, 22, 0.2);
    }

    .btn:hover {
      background-color: var(--color-accent-hover);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .footer {
      margin-top: 32px;
      font-size: 11px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <!-- Lucide CloudOff icon representation -->
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22.61 16.95A5 5 0 0 0 18 10h-1.26a8 8 0 0 0-7.05-6M5 5l14 14"/>
        <path d="M11 17H5a5 5 0 0 1-1.04-9.89l.86-.18A8 8 0 0 1 10 3.12M17 17h1a5 5 0 0 0 3-1"/>
      </svg>
    </div>
    
    <h2>आप ऑफलाइन हैं</h2>
    <p class="hindi">इंटरनेट कनेक्शन उपलब्ध नहीं है। कृपया अपना नेटवर्क कनेक्शन जांचें और फिर से प्रयास करें।</p>
    
    <h1>No Connection</h1>
    <p>You are currently offline. Check your internet connection or mobile network data status.</p>
    
    <button class="btn" id="retry-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
      </svg>
      Try Reconnecting / पुनः प्रयास करें
    </button>

    <div class="footer">
      Pratibha AI • Anganwadi Support Workspace
    </div>
  </div>

  <script>
    document.getElementById('retry-btn').addEventListener('click', () => {
      // Show loading feedback on retry button
      const btn = document.getElementById('retry-btn');
      btn.disabled = true;
      btn.innerText = 'Checking... / जांच की जा रही है...';
      
      setTimeout(() => {
        if (navigator.onLine) {
          window.location.reload();
        } else {
          btn.disabled = false;
          btn.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; display: inline; vertical-align: middle;">
              <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
            </svg>
            Try Reconnecting / पुनः प्रयास करें
          `;
          alert('Still offline. Please check your data connection. / अभी भी ऑफलाइन हैं। कृपया डेटा चालू करें।');
        }
      }, 800);
    });

    // Automatically check online status and reload if we come back online
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
